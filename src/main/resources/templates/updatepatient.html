<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Update Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:linear-gradient(120deg,#89f7fe,#66a6ff);

}

.card{

margin-top:40px;

border-radius:20px;

box-shadow:0px 10px 25px rgba(0,0,0,.3);

}

</style>

</head>

<body>

<div class="container">

<div class="card p-4">

<h2 class="text-center text-success">
Update Patient
</h2>

<form action="/patient/update" method="post">

<input type="hidden" name="patientId"
th:value="${patient.patientId}">

<div class="mb-3">

<label>Name</label>

<input class="form-control" name="patientName"
th:value="${patient.patientName}">

</div>

<div class="mb-3">

<label>Age</label>

<input class="form-control" name="age"
th:value="${patient.age}">

</div>

<div class="mb-3">

<label>Gender</label>

<input class="form-control" name="gender"
th:value="${patient.gender}">

</div>

<div class="mb-3">

<label>Disease</label>

<input class="form-control" name="disease"
th:value="${patient.disease}">

</div>

<div class="mb-3">

<label>Doctor Name</label>

<input class="form-control" name="doctorName"
th:value="${patient.doctorName}">

</div>

<button class="btn btn-success w-100">
Update Patient
</button>

</form>

</div>

</div>

</body>

</html>
