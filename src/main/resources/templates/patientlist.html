<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Patient List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#eef2f7;">

<div class="container mt-5">

<h2 class="text-center text-primary mb-4">
Patient Details
</h2>

<table class="table table-bordered table-hover table-striped">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Name</th>

<th>Age</th>

<th>Gender</th>

<th>Disease</th>

<th>Doctor</th>

<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="patient:${patients}">

<td th:text="${patient.patientId}"></td>

<td th:text="${patient.patientName}"></td>

<td th:text="${patient.age}"></td>

<td th:text="${patient.gender}"></td>

<td th:text="${patient.disease}"></td>

<td th:text="${patient.doctorName}"></td>

<td>

<a th:href="@{/edit/{id}(id=${patient.patientId})}" class="btn btn-warning btn-sm">
Edit
</a>

<a th:href="@{/delete/{id}(id=${patient.patientId})}" class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

</tbody>

</table>

<a href="index.html" class="btn btn-primary">
🏠 Home
</a>

</div>

</body>

</html>
