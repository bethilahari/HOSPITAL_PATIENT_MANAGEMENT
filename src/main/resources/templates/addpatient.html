
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Add Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:#f4f7fc;

}

.card{

margin-top:40px;

border-radius:20px;

box-shadow:0 10px 20px gray;

}

</style>

</head>

<body>

<div class="container">

<div class="card p-4">

<h2 class="text-center text-primary">
Add Patient
</h2>

<form action="/patient/save" method="post">

<div class="mb-3">

<label>Patient ID</label>

<input class="form-control" type="number" name="patientId">

</div>

<div class="mb-3">

<label>Patient Name</label>

<input class="form-control" type="text" name="patientName">

</div>

<div class="mb-3">

<label>Age</label>

<input class="form-control" type="number" name="age">

</div>

<div class="mb-3">

<label>Gender</label>

<select class="form-control" name="gender">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="mb-3">

<label>Disease</label>

<input class="form-control" type="text" name="disease">

</div>

<div class="mb-3">

<label>Doctor Name</label>

<input class="form-control" type="text" name="doctorName">

</div>

<button class="btn btn-success w-100">
Save Patient
</button>

</form>

</div>

</div>

</body>

</html>
